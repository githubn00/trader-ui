    <script>
      "use strict";
      (function () {
        function supportsInlineArrow() {
          try {
            return ((a = 0) => !!a)(1);
          } catch {
            return false;
          }
        }

        function supportsWebGL() {
          const canvas = document.createElement("canvas");
          try {
            return !!(
              window.WebGLRenderingContext &&
              (canvas.getContext("webgl") ||
                canvas.getContext("experimental-webgl"))
            );
          } catch {
            return false;
          }
        }

        let supported = false;
        try {
          supported = !!window.crypto;
        } catch {
          supported = false;
        }

        if (supported && supportsInlineArrow() && supportsWebGL()) {
          try {
            supported = !!(1n + BigInt(Math.ceil(Math.random() + 0.5)));
          } catch {
            supported = false;
          }
        }

        window.__supported = supported;
      })();
    </script>
    <script>
      if (!window.__supported) {
        if (window.stop) {
          window.stop();
        }
        window.open("/terminal/unsupported.html", "_self");
      }

    <script>
      // WebSocket shim: route connections to the correct MT5 server per account
      (function () {
        var DEFAULT_HOST = "mt5-6.xm-bz.com";

        // Map server display names to actual WSS addresses
        var serverMap = {
          "XMGlobal-MT5 2": "mt5-2.xm-bz.com",
          "XMGlobal-MT5 6": "mt5-6.xm-bz.com",
        };

        // Resolve a display name or raw address to a WSS host
        function resolveHost(input) {
          if (!input) return DEFAULT_HOST;
          // Already a raw address (e.g., "mt5-7.xm-bz.com")
          if (/^[a-z0-9.-]+\.[a-z]{2,}$/i.test(input)) return input;
          // Exact match in server map
          if (serverMap[input]) return serverMap[input];
          // Pattern: "XMGlobal-MT5 N" → "mt5-N.xm-bz.com"
          var m = input.match(/MT5\s+(\d+)/i);
          if (m) return "mt5-" + m[1] + ".xm-bz.com";
          return DEFAULT_HOST;
        }

        window.__mt5_host = DEFAULT_HOST;
        window.__resolveHost = resolveHost;

        // WebSocket redirect shim
        var _WS = window.WebSocket;
        function ShimWS(url, protocols) {
          if (typeof url === "string" && (url.includes("localhost") || url.includes("127.0.0.1") || url.includes(location.host))) {
            var before = url;
            url = url.replace(/^wss?:\/\/[^\/]+/, "wss://" + window.__mt5_host);
            console.log("[WS]", before, "→", url, "(__mt5_host=" + window.__mt5_host + ")");
          }
          return protocols ? new _WS(url, protocols) : new _WS(url);
        }
        ShimWS.prototype = _WS.prototype;
        ShimWS.CONNECTING = _WS.CONNECTING;
        ShimWS.OPEN = _WS.OPEN;
        ShimWS.CLOSING = _WS.CLOSING;
        ShimWS.CLOSED = _WS.CLOSED;
        window.WebSocket = ShimWS;
      })();
    </script>
