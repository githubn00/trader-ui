<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unsupported Browser</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f7f7f7;
        color: #1d1d1d;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Unsupported Browser</h1>
      <p>
        This terminal requires modern browser features (WebGL, BigInt, and
        crypto support). Please use an up-to-date browser.
      </p>
    </main>
  </body>
</html>
